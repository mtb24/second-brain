# =============================================================
# Litestream — Postgres WAL replication to Backblaze B2
# Place in: ~/brain/litestream.yml
# =============================================================

dbs:
  - path: /var/lib/postgresql/data/PG_VERSION
    replicas:
      - type: s3
        bucket: ${B2_BUCKET}
        path: brain-db-backup
        endpoint: ${B2_ENDPOINT}
        force-path-style: true
        retention: 720h        # keep 30 days of history
        sync-interval: 10s
