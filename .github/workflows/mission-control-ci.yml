name: Mission Control CI

on:
  pull_request:
    paths:
      - ".github/workflows/mission-control-ci.yml"
      - "mission-control/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/mission-control-ci.yml"
      - "mission-control/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: read

concurrency:
  group: mission-control-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit and contract tests
        run: pnpm --filter mission-control test

      - name: Run TypeScript checks
        run: pnpm --filter mission-control typecheck

      - name: Install Chromium for Mission smoke
        run: pnpm --filter mission-control exec playwright install --with-deps chromium

      - name: Run Mission desktop and 390px smoke
        run: pnpm --filter mission-control test:e2e:mission

      - name: Build production bundle
        run: pnpm --filter mission-control build
